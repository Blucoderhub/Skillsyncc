<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Job Analyzer - Job Copilot</title>
  <style>
    :root {
      --bg-primary: #0a0a0a;
      --bg-secondary: #1a1a1a;
      --bg-tertiary: #2a2a2a;
      --bg-card: rgba(30, 30, 30, 0.7);
      --bg-card-hover: rgba(40, 40, 40, 0.7);
      --glass-bg: rgba(30, 30, 30, 0.3);
      --glass-border: rgba(255, 255, 255, 0.1);
      --text-primary: #ffffff;
      --text-secondary: #b0b0b0;
      --accent-orange: #ff9500;
      --accent-orange-hover: #ffaa33;
      --accent-green: #34c759;
      --accent-red: #ff3b30;
      --accent-yellow: #ffcc00;
      --border-radius: 20px;
      --glass-blur: 20px;
      --shadow-glass: 0 8px 32px rgba(0, 0, 0, 0.3);
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.6;
      min-height: 100vh;
      padding: 20px;
      backdrop-filter: blur(10px);
    }
    
    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 20px;
    }
    
    .header {
      text-align: center;
      margin-bottom: 40px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: var(--border-radius);
      padding: 40px;
      backdrop-filter: blur(var(--glass-blur));
      box-shadow: var(--shadow-glass);
      position: relative;
      overflow: hidden;
    }
    
    .header::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: radial-gradient(circle at center, rgba(255, 149, 0, 0.1) 0%, transparent 70%);
      pointer-events: none;
    }
    
    .header h1 {
      font-size: 3rem;
      font-weight: 700;
      margin-bottom: 15px;
      background: linear-gradient(135deg, var(--accent-orange), var(--accent-yellow));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      position: relative;
      z-index: 1;
    }
    
    .header p {
      font-size: 1.2rem;
      color: var(--text-secondary);
      position: relative;
      z-index: 1;
    }
    
    .card {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: var(--border-radius);
      padding: 32px;
      margin-bottom: 24px;
      backdrop-filter: blur(var(--glass-blur));
      box-shadow: var(--shadow-glass);
      transition: all 0.3s ease;
    }
    
    .card:hover {
      transform: translateY(-2px);
      border-color: rgba(255, 149, 0, 0.3);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
    }
    
    .form-group {
      margin-bottom: 24px;
    }
    
    label {
      display: block;
      margin-bottom: 12px;
      font-weight: 500;
      color: var(--text-primary);
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    textarea, input {
      width: 100%;
      padding: 16px;
      background: var(--bg-card);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      color: var(--text-primary);
      font-size: 16px;
      box-sizing: border-box;
      font-family: inherit;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
    }
    
    textarea {
      min-height: 200px;
      resize: vertical;
      font-family: 'SF Mono', 'Monaco', 'Inconsolata', monospace;
    }
    
    textarea:focus, input:focus {
      outline: none;
      border-color: var(--accent-orange);
      box-shadow: 0 0 0 3px rgba(255, 149, 0, 0.2);
    }
    
    .btn {
      background: linear-gradient(135deg, var(--accent-orange), var(--accent-yellow));
      color: white;
      border: none;
      padding: 16px 32px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-right: 12px;
      box-shadow: 0 4px 20px rgba(255, 149, 0, 0.3);
    }
    
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 25px rgba(255, 149, 0, 0.4);
    }
    
    .btn:active {
      transform: translateY(0);
    }
    
    .btn:disabled {
      background: var(--bg-tertiary);
      cursor: not-allowed;
      opacity: 0.5;
      transform: none;
      box-shadow: none;
    }
    
    .result {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: var(--border-radius);
      padding: 32px;
      margin-top: 32px;
      display: none;
      backdrop-filter: blur(var(--glass-blur));
      box-shadow: var(--shadow-glass);
    }
    
    .result h3 {
      margin-top: 0;
      color: var(--text-primary);
      font-size: 24px;
      margin-bottom: 20px;
    }
    
    .match-score {
      font-size: 3rem;
      font-weight: bold;
      text-align: center;
      margin: 30px 0;
      padding: 20px;
      background: var(--bg-card);
      border-radius: 16px;
      border: 2px solid var(--accent-orange);
    }
    
    .skills-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      margin: 30px 0;
    }
    
    .skills-section {
      background: var(--bg-card);
      padding: 20px;
      border-radius: 12px;
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(10px);
    }
    
    .skills-section h4 {
      margin-top: 0;
      color: var(--text-primary);
      font-size: 16px;
      margin-bottom: 12px;
    }
    
    .skill-tag {
      display: inline-block;
      background: rgba(52, 199, 89, 0.2);
      color: var(--accent-green);
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 12px;
      margin: 4px 4px 4px 0;
      border: 1px solid rgba(52, 199, 89, 0.3);
    }
    
    .missing-skill {
      background: rgba(255, 59, 48, 0.2);
      color: var(--accent-red);
      border-color: rgba(255, 59, 48, 0.3);
    }
    
    .loading {
      text-align: center;
      padding: 60px;
      display: none;
      background: var(--glass-bg);
      border-radius: var(--border-radius);
      backdrop-filter: blur(var(--glass-blur));
      border: 1px solid var(--glass-border);
      margin: 40px 0;
    }
    
    .spinner {
      border: 4px solid rgba(255, 255, 255, 0.1);
      border-top: 4px solid var(--accent-orange);
      border-radius: 50%;
      width: 60px;
      height: 60px;
      animation: spin 1s linear infinite;
      margin: 0 auto 24px;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🔍 Job Analyzer</h1>
      <p>Analyze job requirements and match with your skills</p>
    </div>
    
    <div class="card">
      <h2>Job Information</h2>
      <div class="form-group">
        <label for="job-title">Job Title</label>
        <input type="text" id="job-title" placeholder="e.g., Senior Software Engineer">
      </div>
      
      <div class="form-group">
        <label for="job-company">Company</label>
        <input type="text" id="job-company" placeholder="e.g., Google">
      </div>
      
      <div class="form-group">
        <label for="job-description">Job Description</label>
        <textarea id="job-description" placeholder="Paste the job description here..."></textarea>
      </div>
      
      <div class="form-group">
        <label for="job-skills">Required Skills (comma-separated)</label>
        <input type="text" id="job-skills" placeholder="e.g., React, Node.js, Python, AWS">
      </div>
    </div>
    
    <div class="card">
      <h2>Your Skills</h2>
      <div class="form-group">
        <label for="your-skills">Your Skills (comma-separated)</label>
        <input type="text" id="your-skills" placeholder="e.g., React, JavaScript, Python, Docker, AWS">
      </div>
      
      <div class="form-group">
        <label for="experience">Relevant Experience</label>
        <textarea id="experience" placeholder="Briefly describe your relevant work experience..."></textarea>
      </div>
    </div>
    
    <button class="btn" id="analyze-btn">Analyze Job Match</button>
    
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <div>Analyzing job match with AI...</div>
    </div>
    
    <div class="result" id="result">
      <h3>🎯 Match Analysis</h3>
      <div class="match-score" id="match-score">0%</div>
      
      <div class="skills-grid">
        <div class="skills-section">
          <h4>✅ Matching Skills</h4>
          <div id="matched-skills"></div>
        </div>
        
        <div class="skills-section">
          <h4>❌ Missing Skills</h4>
          <div id="missing-skills"></div>
        </div>
      </div>
      
      <div class="skills-section">
        <h4>💡 Recommendations</h4>
        <div id="recommendations"></div>
      </div>
    </div>
  </div>

  <script src="../features/job-analyzer.js"></script>
</body>
</html>
