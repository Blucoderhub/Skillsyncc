<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Resume Optimizer - Job Copilot</title>
  <style>
    :root {
      --bg-primary: #0a0a0a;
      --bg-secondary: #1a1a1a;
      --bg-tertiary: #2a2a2a;
      --bg-card: rgba(30, 30, 30, 0.7);
      --bg-card-hover: rgba(40, 40, 40, 0.7);
      --glass-bg: rgba(30, 30, 30, 0.3);
      --glass-border: rgba(255, 255, 255, 0.1);
      --text-primary: #ffffff;
      --text-secondary: #b0b0b0;
      --accent-blue: #007aff;
      --accent-blue-hover: #00aaff;
      --accent-green: #34c759;
      --accent-green-hover: #4cd964;
      --accent-purple: #af52de;
      --border-radius: 20px;
      --glass-blur: 20px;
      --shadow-glass: 0 8px 32px rgba(0, 0, 0, 0.3);
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.6;
      min-height: 100vh;
      padding: 20px;
      backdrop-filter: blur(10px);
    }
    
    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 20px;
    }
    
    .header {
      text-align: center;
      margin-bottom: 40px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: var(--border-radius);
      padding: 40px;
      backdrop-filter: blur(var(--glass-blur));
      box-shadow: var(--shadow-glass);
      position: relative;
      overflow: hidden;
    }
    
    .header::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: radial-gradient(circle at center, rgba(0, 122, 255, 0.1) 0%, transparent 70%);
      pointer-events: none;
    }
    
    .header h1 {
      font-size: 3rem;
      font-weight: 700;
      margin-bottom: 15px;
      background: linear-gradient(135deg, var(--accent-blue), var(--accent-green));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      position: relative;
      z-index: 1;
    }
    
    .header p {
      font-size: 1.2rem;
      color: var(--text-secondary);
      position: relative;
      z-index: 1;
    }
    
    .card {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: var(--border-radius);
      padding: 32px;
      margin-bottom: 24px;
      backdrop-filter: blur(var(--glass-blur));
      box-shadow: var(--shadow-glass);
      transition: all 0.3s ease;
    }
    
    .card:hover {
      transform: translateY(-2px);
      border-color: rgba(0, 122, 255, 0.3);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
    }
    
    .form-group {
      margin-bottom: 24px;
    }
    
    label {
      display: block;
      margin-bottom: 12px;
      font-weight: 500;
      color: var(--text-primary);
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    textarea, input {
      width: 100%;
      padding: 16px;
      background: var(--bg-card);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      color: var(--text-primary);
      font-size: 16px;
      box-sizing: border-box;
      font-family: inherit;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
    }
    
    textarea {
      min-height: 200px;
      resize: vertical;
      font-family: 'SF Mono', 'Monaco', 'Inconsolata', monospace;
    }
    
    textarea:focus, input:focus {
      outline: none;
      border-color: var(--accent-blue);
      box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.2);
    }
    
    .btn {
      background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
      color: white;
      border: none;
      padding: 16px 32px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-right: 12px;
      box-shadow: 0 4px 20px rgba(0, 122, 255, 0.3);
    }
    
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 25px rgba(0, 122, 255, 0.4);
    }
    
    .btn:active {
      transform: translateY(0);
    }
    
    .btn:disabled {
      background: var(--bg-tertiary);
      cursor: not-allowed;
      opacity: 0.5;
      transform: none;
      box-shadow: none;
    }
    
    .btn-success {
      background: linear-gradient(135deg, var(--accent-green), #58d470);
      box-shadow: 0 4px 20px rgba(52, 199, 89, 0.3);
    }
    
    .btn-success:hover {
      box-shadow: 0 6px 25px rgba(52, 199, 89, 0.4);
    }
    
    .result {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: var(--border-radius);
      padding: 32px;
      margin-top: 32px;
      display: none;
      backdrop-filter: blur(var(--glass-blur));
      box-shadow: var(--shadow-glass);
    }
    
    .result h3 {
      margin-top: 0;
      color: var(--text-primary);
      font-size: 24px;
      margin-bottom: 20px;
    }
    
    .diff {
      background: var(--bg-card);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      padding: 20px;
      margin: 20px 0;
      font-family: 'SF Mono', 'Monaco', 'Inconsolata', monospace;
      font-size: 14px;
      line-height: 1.5;
    }
    
    .loading {
      text-align: center;
      padding: 60px;
      display: none;
      background: var(--glass-bg);
      border-radius: var(--border-radius);
      backdrop-filter: blur(var(--glass-blur));
      border: 1px solid var(--glass-border);
      margin: 40px 0;
    }
    
    .spinner {
      border: 4px solid rgba(255, 255, 255, 0.1);
      border-top: 4px solid var(--accent-blue);
      border-radius: 50%;
      width: 60px;
      height: 60px;
      animation: spin 1s linear infinite;
      margin: 0 auto 24px;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📄 Resume Optimizer</h1>
      <p>Optimize your resume for specific job descriptions using AI</p>
    </div>
    
    <div class="card">
      <h2>Job Information</h2>
      <div class="form-group">
        <label for="job-title">Job Title</label>
        <input type="text" id="job-title" placeholder="e.g., Senior Software Engineer">
      </div>
      
      <div class="form-group">
        <label for="job-company">Company</label>
        <input type="text" id="job-company" placeholder="e.g., Google">
      </div>
      
      <div class="form-group">
        <label for="job-description">Job Description</label>
        <textarea id="job-description" placeholder="Paste the job description here..."></textarea>
      </div>
      
      <div class="form-group">
        <label for="job-skills">Required Skills (comma-separated)</label>
        <input type="text" id="job-skills" placeholder="e.g., React, Node.js, Python, AWS">
      </div>
    </div>
    
    <div class="card">
      <h2>Your Current Resume</h2>
      <div class="form-group">
        <label for="current-resume">Resume Content</label>
        <textarea id="current-resume" placeholder="Paste your current resume here..."></textarea>
      </div>
    </div>
    
    <button class="btn" id="optimize-btn">Optimize Resume</button>
    <button class="btn btn-success" id="save-btn" disabled>Save Optimized Version</button>
    
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <div>Optimizing your resume with AI...</div>
    </div>
    
    <div class="result" id="result">
      <h3>✨ Optimized Resume</h3>
      <div id="optimized-content"></div>
      <div class="diff" id="changes"></div>
    </div>
  </div>

  <script src="../features/resume-optimizer.js"></script>
</body>
</html>
