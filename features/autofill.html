<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Auto-Fill Forms - Job Copilot</title>
  <style>
    :root {
      --bg-primary: #0a0a0a;
      --bg-secondary: #1a1a1a;
      --bg-tertiary: #2a2a2a;
      --bg-card: rgba(30, 30, 30, 0.7);
      --bg-card-hover: rgba(40, 40, 40, 0.7);
      --glass-bg: rgba(30, 30, 30, 0.3);
      --glass-border: rgba(255, 255, 255, 0.1);
      --text-primary: #ffffff;
      --text-secondary: #b0b0b0;
      --accent-green: #34c759;
      --accent-green-hover: #4cd964;
      --accent-blue: #007aff;
      --accent-yellow: #ffcc00;
      --border-radius: 20px;
      --glass-blur: 20px;
      --shadow-glass: 0 8px 32px rgba(0, 0, 0, 0.3);
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.6;
      min-height: 100vh;
      padding: 20px;
      backdrop-filter: blur(10px);
    }
    
    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 20px;
    }
    
    .header {
      text-align: center;
      margin-bottom: 40px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: var(--border-radius);
      padding: 40px;
      backdrop-filter: blur(var(--glass-blur));
      box-shadow: var(--shadow-glass);
      position: relative;
      overflow: hidden;
    }
    
    .header::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: radial-gradient(circle at center, rgba(52, 199, 89, 0.1) 0%, transparent 70%);
      pointer-events: none;
    }
    
    .header h1 {
      font-size: 3rem;
      font-weight: 700;
      margin-bottom: 15px;
      background: linear-gradient(135deg, var(--accent-green), var(--accent-blue));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      position: relative;
      z-index: 1;
    }
    
    .header p {
      font-size: 1.2rem;
      color: var(--text-secondary);
      position: relative;
      z-index: 1;
    }
    
    .card {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: var(--border-radius);
      padding: 32px;
      margin-bottom: 24px;
      backdrop-filter: blur(var(--glass-blur));
      box-shadow: var(--shadow-glass);
      transition: all 0.3s ease;
    }
    
    .card:hover {
      transform: translateY(-2px);
      border-color: rgba(52, 199, 89, 0.3);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
    }
    
    .form-group {
      margin-bottom: 24px;
    }
    
    label {
      display: block;
      margin-bottom: 12px;
      font-weight: 500;
      color: var(--text-primary);
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    textarea, input, select {
      width: 100%;
      padding: 16px;
      background: var(--bg-card);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      color: var(--text-primary);
      font-size: 16px;
      box-sizing: border-box;
      font-family: inherit;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
    }
    
    textarea {
      min-height: 120px;
      resize: vertical;
      font-family: 'SF Mono', 'Monaco', 'Inconsolata', monospace;
    }
    
    textarea:focus, input:focus, select:focus {
      outline: none;
      border-color: var(--accent-green);
      box-shadow: 0 0 0 3px rgba(52, 199, 89, 0.2);
    }
    
    .btn {
      background: linear-gradient(135deg, var(--accent-green), var(--accent-blue));
      color: white;
      border: none;
      padding: 16px 32px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-right: 12px;
      box-shadow: 0 4px 20px rgba(52, 199, 89, 0.3);
    }
    
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 25px rgba(52, 199, 89, 0.4);
    }
    
    .btn:active {
      transform: translateY(0);
    }
    
    .btn:disabled {
      background: var(--bg-tertiary);
      cursor: not-allowed;
      opacity: 0.5;
      transform: none;
      box-shadow: none;
    }
    
    .btn-success {
      background: linear-gradient(135deg, var(--accent-green), #58d470);
      box-shadow: 0 4px 20px rgba(52, 199, 89, 0.3);
    }
    
    .btn-success:hover {
      box-shadow: 0 6px 25px rgba(52, 199, 89, 0.4);
    }
    
    .field-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      margin: 30px 0;
    }
    
    .field-item {
      background: var(--bg-card);
      padding: 20px;
      border-radius: 12px;
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(10px);
    }
    
    .field-item h4 {
      margin-top: 0;
      color: var(--text-primary);
      font-size: 14px;
      margin-bottom: 12px;
    }
    
    .field-value {
      background: var(--bg-secondary);
      padding: 12px 16px;
      border-radius: 8px;
      border: 1px solid var(--glass-border);
      font-size: 13px;
      margin-top: 8px;
      min-height: 24px;
      font-family: 'SF Mono', 'Monaco', 'Inconsolata', monospace;
    }
    
    .suggestion {
      background: rgba(52, 199, 89, 0.1);
      border: 1px solid rgba(52, 199, 89, 0.2);
      border-radius: 8px;
      padding: 16px;
      margin: 12px 0;
      font-size: 13px;
      backdrop-filter: blur(10px);
    }
    
    .loading {
      text-align: center;
      padding: 60px;
      display: none;
      background: var(--glass-bg);
      border-radius: var(--border-radius);
      backdrop-filter: blur(var(--glass-blur));
      border: 1px solid var(--glass-border);
      margin: 40px 0;
    }
    
    .spinner {
      border: 4px solid rgba(255, 255, 255, 0.1);
      border-top: 4px solid var(--accent-green);
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 24px;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    .toggle-container {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 24px 0;
    }
    
    .toggle-switch {
      position: relative;
      display: inline-block;
      width: 60px;
      height: 34px;
    }
    
    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #ccc;
      transition: .4s;
      border-radius: 34px;
    }
    
    .slider:before {
      position: absolute;
      content: "";
      height: 26px;
      width: 26px;
      left: 4px;
      bottom: 4px;
      background-color: white;
      transition: .4s;
      border-radius: 50%;
    }
    
    input:checked + .slider {
      background-color: var(--accent-green);
    }
    
    input:checked + .slider:before {
      transform: translateX(26px);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>⚡ Auto-Fill Forms</h1>
      <p>Automatically fill application forms with your data</p>
    </div>
    
    <div class="card">
      <h2>Your Profile Information</h2>
      <div class="form-group">
        <label for="full-name">Full Name</label>
        <input type="text" id="full-name" placeholder="John Doe">
      </div>
      
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="john@example.com">
      </div>
      
      <div class="form-group">
        <label for="phone">Phone</label>
        <input type="tel" id="phone" placeholder="(555) 123-4567">
      </div>
      
      <div class="form-group">
        <label for="linkedin">LinkedIn URL</label>
        <input type="url" id="linkedin" placeholder="https://linkedin.com/in/johndoe">
      </div>
      
      <div class="form-group">
        <label for="portfolio">Portfolio/GitHub</label>
        <input type="url" id="portfolio" placeholder="https://github.com/johndoe">
      </div>
      
      <div class="form-group">
        <label for="summary">Professional Summary</label>
        <textarea id="summary" placeholder="Brief professional summary..."></textarea>
      </div>
    </div>
    
    <div class="card">
      <h2>Auto-Fill Settings</h2>
      <div class="toggle-container">
        <label class="toggle-switch">
          <input type="checkbox" id="auto-fill-toggle" checked>
          <span class="slider"></span>
        </label>
        <span>Enable Auto-Fill on Job Sites</span>
      </div>
      
      <div class="form-group">
        <label for="delay">Auto-fill Delay (ms)</label>
        <input type="number" id="delay" value="500" min="0" max="5000">
      </div>
    </div>
    
    <button class="btn" id="test-btn">Test Auto-Fill</button>
    <button class="btn btn-success" id="save-btn">Save Profile</button>
    
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <div>Testing auto-fill suggestions...</div>
    </div>
    
    <div class="card" id="test-results" style="display: none;">
      <h2>Auto-Fill Test Results</h2>
      <div class="field-grid" id="field-suggestions"></div>
    </div>
  </div>

  <script src="../features/autofill.js"></script>
</body>
</html>
